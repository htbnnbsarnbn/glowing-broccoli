<!DOCTYPE html>
<html>
<head>
  <title>View Credentials</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    h1 {
      font-size: 2.2em;
      color: white;
      margin-bottom: 30px;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .credentials-box {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .credential-item {
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid #e0e0e0;
    }

    .credential-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .label {
      font-size: 0.9em;
      color: #666;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .value {
      font-size: 1.2em;
      color: #333;
      font-weight: 500;
      word-break: break-all;
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
    }

    .no-data {
      text-align: center;
      padding: 30px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.1em;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 30px;
      font-size: 1em;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .btn-export {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-export:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    .btn-clear {
      background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
    }

    .btn-clear:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6);
    }

    .btn-back {
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 2px solid white;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
    }

    .message {
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-weight: bold;
      display: none;
    }

    .message.success {
      background: rgba(76, 175, 80, 0.3);
      color: white;
      border: 2px solid rgba(76, 175, 80, 0.6);
    }

    .message.info {
      background: rgba(33, 150, 243, 0.3);
      color: white;
      border: 2px solid rgba(33, 150, 243, 0.6);
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.6em;
      }

      .buttons {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Saved Credentials</h1>
    
    <div id="message" class="message"></div>

    <div id="credentialsDisplay">
      <div class="credentials-box">
        <div class="no-data">Loading your saved credentials...</div>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-export" onclick="exportCredentials()">📥 Export as Text</button>
      <button class="btn btn-clear" onclick="clearCredentials()">🗑️ Clear Data</button>
      <a href="dashboard.html" class="btn btn-back">← Back to Dashboard</a>
    </div>
  </div>

  <script>
    function displayCredentials() {
      const userEmail = localStorage.getItem('userEmail');
      const loginTime = localStorage.getItem('loginTime');
      const display = document.getElementById('credentialsDisplay');

      if (!userEmail || !loginTime) {
        display.innerHTML = `
          <div class="credentials-box">
            <div class="no-data">
              ❌ No saved credentials found.<br><br>
              <a href="login.html" style="color: #667eea; text-decoration: underline; cursor: pointer;">Please login first</a>
            </div>
          </div>
        `;
        return;
      }

      display.innerHTML = `
        <div class="credentials-box">
          <div class="credential-item">
            <div class="label">📧 Email Address</div>
            <div class="value">${userEmail}</div>
          </div>
          <div class="credential-item">
            <div class="label">🕐 Login Time</div>
            <div class="value">${loginTime}</div>
          </div>
          <div class="credential-item">
            <div class="label">✅ Status</div>
            <div class="value">Logged In</div>
          </div>
          <div class="credential-item">
            <div class="label">💾 Stored In</div>
            <div class="value">Browser Local Storage</div>
          </div>
        </div>
      `;
    }

    function exportCredentials() {
      const userEmail = localStorage.getItem('userEmail');
      const loginTime = localStorage.getItem('loginTime');

      if (!userEmail || !loginTime) {
        showMessage('No credentials to export', 'info');
        return;
      }

      const data = `
SAVED USER CREDENTIALS
======================
Email: ${userEmail}
Login Time: ${loginTime}
Exported: ${new Date().toLocaleString()}
======================
      `;

      const blob = new Blob([data], { type: 'text/plain' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `credentials_${Date.now()}.txt`;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      document.body.removeChild(a);

      showMessage('✓ Credentials exported successfully!', 'success');
    }

    function clearCredentials() {
      if (confirm('Are you sure you want to clear all saved credentials?')) {
        localStorage.removeItem('userEmail');
        localStorage.removeItem('loginTime');
        showMessage('✓ All credentials cleared!', 'success');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      }
    }

    function showMessage(text, type) {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = text;
      messageDiv.className = `message ${type}`;
      messageDiv.style.display = 'block';
      setTimeout(() => {
        messageDiv.style.display = 'none';
      }, 3000);
    }

    // Load credentials on page load
    window.addEventListener('load', displayCredentials);
  </script>
</body>
</html>
