<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      font-size: 2.5em;
      color: white;
      margin-bottom: 20px;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
    }

    .welcome-text {
      font-size: 1.3em;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 30px;
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
    }

    .user-email {
      font-size: 1.1em;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.15);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 30px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .buttons {
      display: flex;
      gap: 15px;
      flex-direction: column;
      margin-bottom: 20px;
    }

    .btn {
      padding: 15px 30px;
      font-size: 1.05em;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
    }

    .btn-logout {
      background: linear-gradient(135deg, #FF6B6B 0%, #EE5A52 100%);
      color: white;
      margin-top: 10px;
    }

    .btn-logout:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      margin: 25px 0;
    }

    #loginTime {
      font-size: 0.9em;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
    }

    .not-logged-in {
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 1.8em;
      }

      .welcome-text {
        font-size: 1.1em;
      }

      .btn {
        padding: 12px 20px;
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏠 Dashboard</h1>
    
    <div id="dashboard">
      <div class="welcome-text">Welcome back!</div>
      <div class="user-email" id="userEmail">Loading...</div>
      <div id="loginTime"></div>

      <div class="divider"></div>

      <div class="buttons">
        <a href="credentials.html" class="btn btn-primary">📋 View Your Credentials</a>
        <a href="clock.html" class="btn btn-secondary">🌍 Check World Clock</a>
        <button class="btn btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <div id="notLoggedIn" style="display: none;">
      <div class="not-logged-in" style="font-size: 1.2em; margin-bottom: 30px;">
        ❌ You are not logged in
      </div>
      <a href="login.html" class="btn btn-primary" style="width: 100%;">🔐 Go to Login</a>
    </div>
  </div>

  <script>
    function checkLogin() {
      const userEmail = localStorage.getItem('userEmail');
      const loginTime = localStorage.getItem('loginTime');

      if (!userEmail || !loginTime) {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('notLoggedIn').style.display = 'block';
        return;
      }

      document.getElementById('userEmail').textContent = `📧 ${userEmail}`;
      document.getElementById('loginTime').textContent = `🕐 Logged in at: ${loginTime}`;
    }

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        localStorage.removeItem('userEmail');
        localStorage.removeItem('loginTime');
        window.location.href = 'login.html';
      }
    }

    // Check login status on page load
    window.addEventListener('load', checkLogin);
  </script>
</body>
</html>
